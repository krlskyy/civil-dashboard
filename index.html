<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Team | Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #121214;
            --border: rgba(255, 255, 255, 0.08);
            --burgundy: #800020;
            --burgundy-hover: #a30029;
            --text-main: #ededed;
            --head-color: #ffd700;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body { background: var(--bg-main); color: var(--text-main); font-family: var(--font-family); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .card { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 360px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .input-field { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; transition: border 0.3s; font-size: 14px; }
        .input-field:focus { border-color: var(--burgundy); }
        
        .btn { width: 100%; padding: 14px; margin-top: 12px; background: var(--burgundy); border: none; color: #fff; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.3s; font-size: 14px; }
        .btn:hover { background: var(--burgundy-hover); }
        
        .btn-secondary { background: transparent; border: 1px solid #333; margin-top: 8px; color: #aaa; }
        .btn-secondary:hover { background: #1a1a1c; color: #fff; }
        
        .role-badge { display: inline-block; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 12px; letter-spacing: 0.5px; }
        .role-head { background: rgba(255, 215, 0, 0.1); color: var(--head-color); border: 1px solid rgba(255, 215, 0, 0.2); }
        .role-assist { background: rgba(128, 0, 32, 0.15); color: #ff8ca3; border: 1px solid rgba(128, 0, 32, 0.3); }
        
        .motto { font-size: 10px; color: #444; margin-top: 24px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body>

    <div class="card">
        <div id="auth-section">
            <h2 style="margin-bottom: 24px; font-weight: 600; font-size: 22px;">Workspace</h2>
            <input type="text" id="name" class="input-field" placeholder="Игровой ник">
            <input type="password" id="pass" class="input-field" placeholder="Пароль">
            <button class="btn" onclick="handleAuth()">Продолжить</button>
            <p id="status" style="font-size: 12px; color: #888; margin-top: 16px; min-height: 15px;"></p>
            <div class="motto">Nah, I’m a sky.</div>
        </div>

        <div id="dashboard-section" style="display:none;">
            <h2 id="welcome-text" style="margin-bottom: 8px; font-weight: 600; font-size: 22px;">Загрузка...</h2>
            <div id="role-text" class="role-badge"></div>
            <div style="margin-top: 35px;">
                <button class="btn btn-secondary" onclick="logout()">Завершить сеанс</button>
            </div>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient("ТВОЙ_URL", "ТВОЙ_KEY");

        async function handleAuth() {
            const name = document.getElementById('name').value.trim();
            if (!name) return;
            const formattedName = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase(); // Делает Kirill_sky из kirill_sky
            const pass = document.getElementById('pass').value;
            const email = `${formattedName.toLowerCase()}@civil.team`;
            const status = document.getElementById('status');

            status.innerText = "Подключение...";

            // Принудительно чистим кэш перед новым входом
            await supabase.auth.signOut();
            localStorage.clear();

            let { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
            
            if (error) {
                // Если аккаунта нет - регистрируем
                let { data: signUpData, error: signUpErr } = await supabase.auth.signUp({ email, password: pass });
                if (!signUpErr) {
                    await supabase.from('assistants').insert([{ id: signUpData.user.id, name: formattedName, role: 'assistant' }]);
                    status.innerText = "Профиль создан. Входим...";
                    setTimeout(() => location.reload(), 1000);
                } else {
                    status.innerText = "Ошибка: " + signUpErr.message;
                }
            } else {
                location.reload();
            }
        }

        async function initSession() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase.from('assistants').select('*').eq('id', user.id).single();
                if (profile) {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('dashboard-section').style.display = 'block';
                    document.getElementById('welcome-text').innerText = profile.name;
                    
                    const roleBadge = document.getElementById('role-text');
                    if (profile.role === 'head') {
                        roleBadge.innerText = 'Head of Civil';
                        roleBadge.className = 'role-badge role-head';
                    } else {
                        roleBadge.innerText = 'Civil Assistant';
                        roleBadge.className = 'role-badge role-assist';
                    }
                }
            }
        }

        function logout() { 
            supabase.auth.signOut(); 
            localStorage.clear(); 
            location.reload(); 
        }
        
        initSession();
    </script>
</body>
</html>
