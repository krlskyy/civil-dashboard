<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Team | Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background: #08080a; 
            color: #e5e5e7; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; /* Центрируем по вертикали для экрана входа */
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Неоновый фон */
        body::before, body::after {
            content: ""; position: absolute; width: 400px; height: 400px; border-radius: 50%; z-index: 0; pointer-events: none; filter: blur(60px);
        }
        body::before { top: -10%; right: -10%; background: radial-gradient(circle, rgba(214, 26, 76, 0.1) 0%, rgba(0,0,0,0) 70%); }
        body::after { bottom: -10%; left: -10%; background: radial-gradient(circle, rgba(0, 119, 255, 0.05) 0%, rgba(0,0,0,0) 70%); }

        /* Контейнеры экранов */
        .view-container {
            width: 100%;
            max-width: 1100px;
            z-index: 1;
            display: none; /* Скрыты по умолчанию */
            animation: fadeIn 0.4s ease forwards;
        }
        .view-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Специфично для экрана авторизации */
        #auth-view { max-width: 400px; margin: auto; }

        /* Шапка Dashboard */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 20px; 
        }
        .header h1 { font-size: 24px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; }
        
        .user-controls { display: flex; align-items: center; gap: 15px; }
        .user-profile { display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.03); padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .role-tag { background: rgba(214, 26, 76, 0.2); color: #ffffff; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        
        .btn-logout { background: transparent; color: #8e8e93; border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 13px; }
        .btn-logout:hover { background: rgba(255,255,255,0.05); color: #fff; }

        /* Сетка Dashboard */
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* Карточки (Glassmorphism) */
        .card { 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 20px; padding: 25px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); margin-bottom: 20px; 
        }
        .card-title { font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #8e8e93; margin-bottom: 20px; }

        /* Формы и Инпуты */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #aeaeb2; margin-bottom: 8px; font-weight: 500; }
        .form-control { 
            width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 12px; padding: 14px 16px; color: #ffffff; font-size: 14px; transition: all 0.2s; 
        }
        .form-control:focus { outline: none; border-color: rgba(214, 26, 76, 0.5); background: rgba(0,0,0, 0.4); }
        
        .btn-primary { 
            background: #d61a4c; color: #ffffff; border: none; width: 100%; padding: 14px; 
            border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; 
            box-shadow: 0 4px 15px rgba(214, 26, 76, 0.3); margin-top: 10px;
        }
        .btn-primary:hover:not(:disabled) { background: #f0245c; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(214, 26, 76, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .auth-switch { text-align: center; margin-top: 15px; font-size: 13px; color: #8e8e93; }
        .auth-switch span { color: #d61a4c; cursor: pointer; font-weight: 600; }

        /* Таблица лидеров */
        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: left; }
        .leaderboard-table th { color: #636366; font-size: 12px; font-weight: 600; padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .leaderboard-table td { padding: 14px 0; font-size: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .assistant-name { font-weight: 600; color: #ffffff; }
        .points-badge { background: rgba(48, 209, 88, 0.15); border: 1px solid rgba(48, 209, 88, 0.3); padding: 4px 8px; border-radius: 8px; font-weight: 700; color: #30d158; font-size: 12px; }

        /* Кастомный Toast для уведомлений */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(30, 30, 32, 0.9); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ================= МОБИЛЬНАЯ АДАПТАЦИЯ ================= */
        @media (max-width: 768px) {
            body { padding: 15px; align-items: flex-start; }
            .grid-layout { grid-template-columns: 1fr; gap: 15px; } /* В одну колонку */
            .header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .user-controls { width: 100%; justify-content: space-between; }
            .card { padding: 20px 15px; margin-bottom: 15px; }
            .leaderboard-table th:nth-child(3), .leaderboard-table td:nth-child(3) { display: none; } /* Прячем колонку "Задачи" на мобилках для экономии места */
        }
    </style>
</head>
<body>

    <!-- Уведомления -->
    <div id="toast">Уведомление</div>

    <!-- ================= ЭКРАН 1: АВТОРИЗАЦИЯ ================= -->
    <div id="auth-view" class="view-container active">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 25px; font-size: 22px;">Вход в систему</h2>
            
            <form id="auth-form">
                <!-- Поле Имя скрыто при логине, показывается при регистрации -->
                <div class="form-group" id="name-group" style="display: none;">
                    <label>Игровой никнейм (Ассистент)</label>
                    <input type="text" id="auth-name" class="form-control" placeholder="Kirill_Sky">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" class="form-control" placeholder="admin@brentwood.ru" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="auth-pass" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary" id="auth-btn">Войти</button>
            </form>

            <div class="auth-switch">
                <p id="auth-toggle-text">Новый ассистент? <span onclick="toggleAuthMode()">Зарегистрироваться</span></p>
            </div>
        </div>
    </div>

    <!-- ================= ЭКРАН 2: DASHBOARD ================= -->
    <div id="dashboard-view" class="view-container">
        <div class="header">
            <div><h1>Civil Team Workspace</h1></div>
            <div class="user-controls">
                <div class="user-profile">
                    <span class="role-tag">Staff</span>
                    <strong id="current-user-name">Загрузка...</strong>
                </div>
                <button class="btn-logout" onclick="logOut()">Выход</button>
            </div>
        </div>

        <div class="grid-layout">
            <!-- Левая колонка: Форма -->
            <div>
                <div class="card">
                    <div class="card-title">📝 Залогировать работу</div>
                    <form id="work-form">
                        <div class="form-group">
                            <label>Что было сделано?</label>
                            <select class="form-control" id="task-select" required>
                                <option value="10">Проверка топика фракции (+10 XP)</option>
                                <option value="20">Контроль игры в игре (+20 XP)</option>
                                <option value="15">Обработка заявки на бизнес (+15 XP)</option>
                                <option value="30">Глобальная RP ситуация (+30 XP)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Доказательства (Ссылка на СС/Форум)</label>
                            <input type="url" id="proof-url" class="form-control" placeholder="https://bw-p.ru/..." required>
                        </div>
                        <button type="submit" class="btn-primary" id="submit-log-btn">Внести в реестр</button>
                    </form>
                </div>
            </div>

            <!-- Правая колонка: Лидерборд -->
            <div>
                <div class="card">
                    <div class="card-title">🏆 Живой реестр активности</div>
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Ассистент</th>
                                <th>Задачи</th>
                                <th>Баллы</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-data">
                            <tr><td colspan="4" style="text-align: center; color: #8e8e93;">Загрузка данных...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= ЛОГИКА ПРИЛОЖЕНИЯ ================= -->
    <script>
        // --- 1. НАСТРОЙКИ SUPABASE ---
        const SUPABASE_URL = "https://jdrepnjvvyzaiohihvvw.supabase.co/rest/v1/";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkcmVwbmp2dnl6YWlvaGlodnZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDczODUsImV4cCI6MjA5NzI4MzM4NX0.Byex7T_qRiiVBmFMD3QeS8tALx5k1ZIV34O2QDrjjbI";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. ПЕРЕМЕННЫЕ СОСТОЯНИЯ ---
        let isRegisterMode = false;
        let currentUserData = null;

        // --- 3. UI ФУНКЦИИ ---
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.borderLeft = isError ? "4px solid #ff453a" : "4px solid #30d158";
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('name-group').style.display = isRegisterMode ? 'block' : 'none';
            document.getElementById('auth-name').required = isRegisterMode;
            document.getElementById('auth-btn').innerText = isRegisterMode ? 'Создать аккаунт' : 'Войти';
            document.getElementById('auth-toggle-text').innerHTML = isRegisterMode 
                ? 'Уже в команде? <span onclick="toggleAuthMode()">Войти</span>'
                : 'Новый ассистент? <span onclick="toggleAuthMode()">Зарегистрироваться</span>';
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            // Если перешли в Dashboard, восстанавливаем выравнивание body по верху для скролла
            if(viewId === 'dashboard-view') {
                document.body.style.alignItems = 'flex-start';
            } else {
                document.body.style.alignItems = 'center';
            }
        }

        // --- 4. АВТОРИЗАЦИЯ И СЕССИИ ---
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Если есть сессия, получаем профиль ассистента
                const { data: profile } = await supabase.from('assistants').select('*').eq('id', session.user.id).single();
                if (profile) {
                    currentUserData = profile;
                    document.getElementById('current-user-name').innerText = profile.name;
                    switchView('dashboard-view');
                    loadLeaderboard();
                }
            } else {
                switchView('auth-view');
            }
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('auth-btn');
            btn.disabled = true;
            btn.innerText = 'Загрузка...';

            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;

            try {
                if (isRegisterMode) {
                    const name = document.getElementById('auth-name').value;
                    // Регистрация в Auth
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    
                    // Создание записи в таблице assistants
                    if (data.user) {
                        const { error: dbError } = await supabase.from('assistants').insert([
                            { id: data.user.id, email: email, name: name }
                        ]);
                        if (dbError) throw dbError;
                    }
                    showToast('Аккаунт создан! Добро пожаловать.');
                } else {
                    // Логин
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    showToast('Успешный вход.');
                }
                setTimeout(checkSession, 1000); // Проверяем сессию и пускаем внутрь
            } catch (err) {
                showToast(err.message, true);
            } finally {
                btn.disabled = false;
                btn.innerText = isRegisterMode ? 'Создать аккаунт' : 'Войти';
            }
        });

        async function logOut() {
            await supabase.auth.signOut();
            currentUserData = null;
            checkSession();
        }

        // --- 5. РАБОТА С БАЗОЙ ДАННЫХ (DASHBOARD) ---
        async function loadLeaderboard() {
            const { data: assistants, error } = await supabase
                .from('assistants')
                .select('*')
                .order('points', { ascending: false });

            if (error) return console.error(error);

            const tbody = document.getElementById('leaderboard-data');
            tbody.innerHTML = '';

            assistants.forEach((user, index) => {
                let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '<span style="color:#636366">#</span>';
                
                // Выделяем самого себя в таблице
                const isMe = currentUserData && currentUserData.id === user.id;
                const rowStyle = isMe ? 'background: rgba(214, 26, 76, 0.1);' : '';
                
                tbody.innerHTML += `
                    <tr style="${rowStyle}">
                        <td>${medal}</td>
                        <td class="assistant-name">${user.name} ${isMe ? '(Ты)' : ''}</td>
                        <td>${user.tasks_count}</td>
                        <td><span class="points-badge">+${user.points} XP</span></td>
                    </tr>
                `;
            });
        }

        document.getElementById('work-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUserData) return showToast('Ошибка: Нет данных профиля', true);

            const btn = document.getElementById('submit-log-btn');
            btn.disabled = true;
            btn.innerText = 'Отправка...';

            const taskSelect = document.getElementById('task-select');
            const pointsToAdd = parseInt(taskSelect.value);
            const taskText = taskSelect.options[taskSelect.selectedIndex].text;
            const proofUrl = document.getElementById('proof-url').value;

            try {
                // 1. Запись лога (от лица того, кто авторизован)
                await supabase.from('work_logs').insert([{ 
                    assistant_id: currentUserData.id, 
                    assistant_name: currentUserData.name,
                    task_type: taskText, 
                    points_awarded: pointsToAdd,
                    proof_url: proofUrl 
                }]);

                // 2. Добавляем баллы в профиль
                await supabase.from('assistants').update({ 
                    points: currentUserData.points + pointsToAdd, 
                    tasks_count: currentUserData.tasks_count + 1 
                }).eq('id', currentUserData.id);

                // Обновляем локальные данные и UI
                currentUserData.points += pointsToAdd;
                currentUserData.tasks_count += 1;
                
                document.getElementById('proof-url').value = '';
                showToast(`+${pointsToAdd} XP начислено!`);
                loadLeaderboard();
            } catch (err) {
                showToast('Ошибка при отправке: ' + err.message, true);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Внести в реестр';
            }
        });

        // Запуск при загрузке
        checkSession();
    </script>
</body>
</html>
